fail_fast: true
repos:

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && uv run ruff format'
        language: system
        files: \.py$
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: bash -c 'cd backend && uv run ruff check --fix'
        language: system
        files: \.py$
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: bash -c 'cd backend && CI=true uv run pytest -q --cov=src/ccaudit'
        language: system
        pass_filenames: false
        always_run: true
      - id: eslint
        name: eslint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
      - id: tsc
        name: tsc
        entry: bash -c 'cd frontend && npx tsc -b'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
