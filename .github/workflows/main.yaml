name: CI / Publish

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # README lives at repo root; hatch expects it inside backend/.
      - run: cp README.md backend/README.md

      # Frontend: install, lint, typecheck, build (into backend/src/cctape/static/)
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npx tsc -b
      - run: cd frontend && npm run build

      # Backend: install, lint, typecheck, test, build sdist+wheel
      - run: cd backend && uv sync
      - run: cd backend && uv run ruff format --check
      - run: cd backend && uv run ruff check
      - run: cd backend && uv run pyright
      - run: cd backend && CI=true uv run pytest -q --cov=src/cctape
      - run: cd backend && uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: backend/dist/

  publish-pypi:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
